<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-SCAN // NEURAL ENVIRONMENT MAPPER</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- TensorFlow.js and COCO-SSD Model -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
    
    <!-- Three.js and add-ons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
    
    <!-- Google Fonts for Cyberpunk Aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ea;
            --neon-green: #00ff66;
            --dark-bg: #050510;
            --grid-color: rgba(0, 243, 255, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--neon-cyan);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden; /* Prevent scrolling, full screen app */
            user-select: none;
        }

        /* CRT Effects and Overlays */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
            opacity: 0.6;
        }

        .crt-flicker {
            animation: flicker 0.15s infinite;
            pointer-events: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 243, 255, 0.02);
            z-index: 49;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 0.85; }
            100% { opacity: 0.95; }
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 48;
        }

        /* UI Elements */
        .hud-panel {
            background: rgba(5, 5, 16, 0.7);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2) inset;
            backdrop-filter: blur(4px);
        }

        .hud-title {
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--neon-cyan);
        }

        .terminal-text {
            text-shadow: 0 0 5px var(--neon-cyan);
        }

        .terminal-line {
            animation: typeIn 0.1s ease-out forwards;
            opacity: 0;
            transform: translateX(-10px);
        }

        @keyframes typeIn {
            to { opacity: 1; transform: translateX(0); }
        }

        /* Video Feed Container */
        #video-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.2) saturate(0.8) hue-rotate(180deg); /* Stylize the real feed */
            opacity: 0.7;
        }

        #hud-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Custom Scrollbar for Terminal */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 243, 255, 0.1); 
        }
        ::-webkit-scrollbar-thumb {
            background: var(--neon-cyan); 
        }

        /* Glitch Button */
        .btn-cyber {
            background: transparent;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            text-transform: uppercase;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .btn-cyber:hover {
            background: var(--neon-cyan);
            color: var(--dark-bg);
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        .btn-cyber::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: all 0.4s;
        }
        .btn-cyber:hover::before {
            left: 100%;
        }

        /* Targeting Reticle */
        .reticle {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40px; height: 40px;
            pointer-events: none;
            z-index: 20;
        }
        .reticle::before, .reticle::after {
            content: ''; position: absolute; background: var(--neon-magenta);
        }
        .reticle::before { top: 50%; left: -10px; right: -10px; height: 1px; }
        .reticle::after { left: 50%; top: -10px; bottom: -10px; width: 1px; }

        /* Scanning Sweep Animation */
        .scan-sweep {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--neon-green);
            box-shadow: 0 0 15px 5px rgba(0, 255, 102, 0.4);
            animation: sweep 4s linear infinite;
            z-index: 15;
            pointer-events: none;
        }

        @keyframes sweep {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* Loading Screen */
        #loader {
            position: fixed; inset: 0; background: var(--dark-bg); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(0, 243, 255, 0.3);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-sm">

    <!-- Global Effects -->
    <div class="scanlines"></div>
    <div class="crt-flicker"></div>
    <div class="vignette"></div>

    <!-- Initial Loading Screen -->
    <div id="loader">
        <div class="spinner mb-6"></div>
        <h1 class="text-2xl font-bold font-['Rajdhani'] text-[var(--neon-cyan)] tracking-widest animate-pulse">INITIATING NEURAL LINK...</h1>
        <p class="mt-2 text-gray-400" id="loader-status">Awaiting hardware access...</p>
    </div>

    <!-- Main Layout Grid -->
    <div class="flex h-screen w-screen p-4 gap-4 relative z-10 box-border">
        
        <!-- Left Column: Live Feed & Info -->
        <div class="flex flex-col w-1/3 gap-4 h-full z-10 pointer-events-none">
            
            <!-- System Status -->
            <div class="hud-panel p-3 pointer-events-auto">
                <div class="hud-title text-lg font-bold mb-2 pb-1 flex justify-between">
                    <span>SYS.STATUS</span>
                    <span class="text-[var(--neon-green)] animate-pulse">ONLINE</span>
                </div>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div>LINK: <span class="text-white">SECURE</span></div>
                    <div>FPS: <span id="fps-counter" class="text-white">--</span></div>
                    <div>ENTITIES: <span id="entity-count" class="text-white">0</span></div>
                    <div>MODE: <span class="text-[var(--neon-magenta)]">MAP</span></div>
                </div>
            </div>

            <!-- Terminal Feed -->
            <div class="hud-panel p-3 flex-grow flex flex-col pointer-events-auto">
                <div class="hud-title text-lg font-bold mb-2 pb-1">EVENT.LOG</div>
                <div id="terminal" class="flex-grow overflow-y-auto font-mono text-xs flex flex-col justify-end">
                    <!-- Logs inserted here -->
                </div>
            </div>
            
            <!-- Controls -->
            <div class="hud-panel p-3 pointer-events-auto">
                <div class="hud-title text-lg font-bold mb-2 pb-1">UPLINK.CTRL</div>
                <button id="btn-export" class="btn-cyber w-full py-2 mb-2 font-bold tracking-wider cursor-pointer">
                    EXPORT 3D MAP [.GLB]
                </button>
                <button id="btn-reset" class="btn-cyber w-full py-2 font-bold tracking-wider text-[var(--neon-magenta)] border-[var(--neon-magenta)] cursor-pointer hover:bg-[var(--neon-magenta)] hover:text-white">
                    PURGE MEMORY
                </button>
            </div>
        </div>

        <!-- Right Column: Main Visuals -->
        <div class="flex flex-col w-2/3 h-full gap-4 relative">
            
            <!-- Top: Live Camera Feed with 2D HUD -->
            <div class="h-1/2 w-full relative group">
                <div class="absolute top-0 left-0 bg-[var(--neon-cyan)] text-[var(--dark-bg)] px-2 py-1 font-bold z-20 text-xs rounded-br-md">OPTICAL.SENSOR // RAW</div>
                <div id="video-container">
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="hud-canvas"></canvas>
                    <div class="reticle"></div>
                    <div class="scan-sweep"></div>
                </div>
            </div>

            <!-- Bottom: Interactive 3D Digital Twin -->
            <div class="h-1/2 w-full hud-panel relative overflow-hidden group">
                <div class="absolute top-0 left-0 bg-[var(--neon-magenta)] text-white px-2 py-1 font-bold z-20 text-xs rounded-br-md">SPATIAL.RECONSTRUCTION // 3D</div>
                <div class="absolute top-1 right-2 z-20 text-xs opacity-50 pointer-events-none">DRAG TO ROTATE / SCROLL TO ZOOM</div>
                <div id="scene-container" class="w-full h-full cursor-crosshair"></div>
                
                <!-- Target Info Overlay (Hidden by default) -->
                <div id="target-info" class="absolute bottom-4 right-4 bg-black border border-[var(--neon-green)] p-2 text-xs text-[var(--neon-green)] hidden z-20 pointer-events-none">
                    <div class="font-bold border-b border-[var(--neon-green)] mb-1">TARGET.INFO</div>
                    <div>CLASS: <span id="ti-class" class="text-white"></span></div>
                    <div>CONF: <span id="ti-conf" class="text-white"></span>%</div>
                    <div>DIST: <span id="ti-dist" class="text-white"></span>m</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- System State ---
        const state = {
            isRunning: false,
            model: null,
            entities: new Map(), // Stores 3D representations of detected objects
            entityIdCounter: 0,
            frameCount: 0,
            lastTime: performance.now(),
            cameraWidth: 640, // Target processing resolution
            cameraHeight: 480
        };

        // --- DOM Elements ---
        const els = {
            video: document.getElementById('webcam'),
            canvas: document.getElementById('hud-canvas'),
            ctx: document.getElementById('hud-canvas').getContext('2d'),
            sceneContainer: document.getElementById('scene-container'),
            terminal: document.getElementById('terminal'),
            loader: document.getElementById('loader'),
            loaderStatus: document.getElementById('loaderStatus'),
            fpsCount: document.getElementById('fps-counter'),
            entityCount: document.getElementById('entity-count'),
            targetInfo: document.getElementById('target-info'),
            tiClass: document.getElementById('ti-class'),
            tiConf: document.getElementById('ti-conf'),
            tiDist: document.getElementById('ti-dist'),
            btnExport: document.getElementById('btn-export'),
            btnReset: document.getElementById('btn-reset')
        };

        // --- Three.js Variables ---
        let scene, camera, renderer, controls;
        let scanGrid, raycaster, mouse;
        const clock = new THREE.Clock();

        // --- Utility: Terminal Logger ---
        function logMsg(msg, type = 'info') {
            const line = document.createElement('div');
            line.className = 'terminal-line my-1 flex gap-2';
            
            const timestamp = new Date().toLocaleTimeString('en-US', { hour12: false, fractionalSecondDigits: 2 });
            let colorClass = 'text-[var(--neon-cyan)]';
            if (type === 'warn') colorClass = 'text-yellow-400';
            if (type === 'error') colorClass = 'text-red-500';
            if (type === 'success') colorClass = 'text-[var(--neon-green)]';
            if (type === 'new') colorClass = 'text-[var(--neon-magenta)]';

            line.innerHTML = `
                <span class="opacity-50">[${timestamp}]</span>
                <span class="${colorClass}">${msg}</span>
            `;
            els.terminal.appendChild(line);
            
            // Keep terminal from growing forever
            if (els.terminal.children.length > 30) {
                els.terminal.removeChild(els.terminal.firstChild);
            }
            els.terminal.scrollTop = els.terminal.scrollHeight;
        }

        function updateLoaderStatus(msg) {
            const el = document.getElementById('loader-status');
            if(el) el.innerText = msg;
        }

        function initThreeJS() {
            logMsg("Initializing spatial engine...");
            
            // Scene Setup
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050510, 0.05);

            // Camera Setup
            const aspect = els.sceneContainer.clientWidth / els.sceneContainer.clientHeight;
            camera = new THREE.PerspectiveCamera(60, aspect, 0.1, 100);
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 0, 0);

            // Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(els.sceneContainer.clientWidth, els.sceneContainer.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            els.sceneContainer.appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

            // Environment Details (The Grid)
            scanGrid = new THREE.GridHelper(40, 40, 0x00f3ff, 0x00f3ff);
            scanGrid.material.opacity = 0.15;
            scanGrid.material.transparent = true;
            scene.add(scanGrid);

            // Add some ambient light
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            // Add a central "scanner origin" marker
            const originGeo = new THREE.OctahedronGeometry(0.2);
            const originMat = new THREE.MeshBasicMaterial({ color: 0xff00ea, wireframe: true });
            const originMesh = new THREE.Mesh(originGeo, originMat);
            originMesh.position.y = 0.2;
            scene.add(originMesh);

            // Interaction Setup
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Handle Resize
            window.addEventListener('resize', onWindowResize, false);
            
            // Handle Interaction
            els.sceneContainer.addEventListener('mousemove', onSceneMouseMove, false);

            logMsg("Spatial engine initialized.", "success");
        }

        function onWindowResize() {
            // Update 3D aspect ratio
            if (camera && renderer && els.sceneContainer) {
                camera.aspect = els.sceneContainer.clientWidth / els.sceneContainer.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(els.sceneContainer.clientWidth, els.sceneContainer.clientHeight);
            }
            
            // Update 2D Canvas size to match video
            resizeCanvas();
        }

        function resizeCanvas() {
            // Ensure canvas matches video display size precisely
            const rect = els.video.getBoundingClientRect();
            els.canvas.width = rect.width;
            els.canvas.height = rect.height;
        }

        function onSceneMouseMove(event) {
            // Calculate mouse position in normalized device coordinates (-1 to +1)
            const rect = els.sceneContainer.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Intersect only with map entities, not the grid
            const objectsToTest = Array.from(state.entities.values()).map(e => e.mesh);
            const intersects = raycaster.intersectObjects(objectsToTest);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                
                // Highlight
                objectsToTest.forEach(m => m.material.color.setHex(0x00f3ff)); // Reset all
                object.material.color.setHex(0x00ff66); // Highlight hovered

                // Show Data
                els.targetInfo.classList.remove('hidden');
                els.tiClass.innerText = object.userData.class.toUpperCase();
                els.tiConf.innerText = Math.round(object.userData.score * 100);
                els.tiDist.innerText = object.position.z.toFixed(2);
                
                document.body.style.cursor = 'crosshair';
            } else {
                // Reset colors if hovering nothing
                objectsToTest.forEach(m => m.material.color.setHex(0x00f3ff));
                els.targetInfo.classList.add('hidden');
                document.body.style.cursor = 'default';
            }
        }

        async function initAI() {
            updateLoaderStatus("Loading neural network weights (COCO-SSD)...");
            logMsg("Downloading detection model...", "warn");
            try {
                // Load the COCO-SSD model. It's relatively fast for browsers.
                state.model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
                logMsg("Neural network online.", "success");
            } catch (error) {
                logMsg("Failed to load AI model: " + error.message, "error");
                updateLoaderStatus("ERROR: Model load failed.");
                throw error;
            }
        }

        async function initCamera() {
            updateLoaderStatus("Requesting optical sensor access...");
            logMsg("Requesting camera permissions...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "environment", // Prefer back camera on mobile
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });
                
                els.video.srcObject = stream;
                
                // Wait for video to be ready to play
                return new Promise((resolve) => {
                    els.video.onloadedmetadata = () => {
                        els.video.play();
                        state.cameraWidth = els.video.videoWidth;
                        state.cameraHeight = els.video.videoHeight;
                        resizeCanvas();
                        logMsg("Optical sensor active.", "success");
                        resolve();
                    };
                });
            } catch (error) {
                logMsg("Camera access denied or unavailable: " + error.message, "error");
                updateLoaderStatus("ERROR: Optical sensor inaccessible.");
                alert("This scanner requires camera access to function. Please grant permissions and reload.");
                throw error;
            }
        }

        function processDetections(predictions) {
            const currentFrameIds = new Set();
            const canvasRect = els.canvas.getBoundingClientRect();
            
            predictions.forEach(pred => {
                // Ignore low confidence
                if (pred.score < 0.5) return;

                // 1. Calculate Spatial Position from 2D Bounding Box
                // We use crude heuristics because we lack real depth data.
                // Box structure: [x, y, width, height]
                const [x, y, w, h] = pred.bbox;
                
                // Map screen X to 3D X (-left to +right)
                // Normalize X to -1 to 1 based on original video resolution
                const normX = ((x + w/2) / state.cameraWidth) * 2 - 1;
                const mapX = normX * 8; // Spread factor

                // Map screen Y to 3D Z (depth)
                // Assumption: Things lower on the screen (higher Y pixel value) are closer.
                // Things higher (lower Y pixel value) are further away.
                // Normalize Y based on the bottom of the bounding box
                const bottomY = y + h;
                const normY = (bottomY / state.cameraHeight); 
                // Invert so higher normY (lower on screen) = closer (smaller Z)
                // Map Z from 2 (close) to 15 (far)
                let mapZ = 15 - (normY * 13); 
                
                // Failsafe: if something is huge, it's probably close regardless of Y
                const sizeRatio = (w * h) / (state.cameraWidth * state.cameraHeight);
                if (sizeRatio > 0.4) mapZ = 3;

                // Box dimensions in 3D based on 2D bounding box
                // Scale physical size down
                const boxW = (w / state.cameraWidth) * 5;
                const boxH = (h / state.cameraHeight) * 5;
                const boxD = boxW * 0.5; // Arbitrary depth

                // 2. Spatial Hashing / Entity Tracking
                // We don't have real SLAM. To make a "persistent map", we check if we've 
                // seen this type of object near this spatial location recently.
                let matchedEntityId = null;
                const updateThreshold = 2.0; // Distance to consider it the "same" object

                for (const [id, entity] of state.entities.entries()) {
                    if (entity.class === pred.class) {
                        const dist = Math.hypot(entity.targetPos.x - mapX, entity.targetPos.z - mapZ);
                        if (dist < updateThreshold) {
                            matchedEntityId = id;
                            break;
                        }
                    }
                }

                if (matchedEntityId !== null) {
                    // Update existing entity
                    const entity = state.entities.get(matchedEntityId);
                    // Smoothly interpolate position (adds stability to jittery detections)
                    entity.targetPos.x = mapX;
                    entity.targetPos.z = mapZ;
                    entity.targetSize.set(boxW, boxH, boxD);
                    entity.lastSeen = performance.now();
                    entity.score = pred.score;
                    currentFrameIds.add(matchedEntityId);
                } else {
                    // Create new entity
                    const id = `ENT-${state.entityIdCounter++}`;
                    logMsg(`Acquired new target: ${pred.class.toUpperCase()}`, 'new');
                    
                    // Create 3D Mesh
                    const geometry = new THREE.BoxGeometry(1, 1, 1);
                    const material = new THREE.MeshBasicMaterial({ 
                        color: 0x00f3ff, 
                        wireframe: true,
                        transparent: true,
                        opacity: 0.8
                    });
                    const mesh = new THREE.Mesh(geometry, material);
                    
                    // Initial setup
                    mesh.position.set(mapX, boxH/2, mapZ);
                    mesh.scale.set(boxW, boxH, boxD);
                    mesh.userData = { id, class: pred.class, score: pred.score };
                    
                    scene.add(mesh);

                    // Add label sprite
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.width = 256; canvas.height = 64;
                    context.fillStyle = '#00f3ff';
                    context.font = 'bold 32px monospace';
                    context.fillText(pred.class.toUpperCase(), 10, 40);
                    
                    const tex = new THREE.CanvasTexture(canvas);
                    const spriteMat = new THREE.SpriteMaterial({ map: tex });
                    const sprite = new THREE.Sprite(spriteMat);
                    sprite.scale.set(2, 0.5, 1);
                    sprite.position.y = boxH + 0.5;
                    mesh.add(sprite);

                    state.entities.set(id, {
                        id,
                        class: pred.class,
                        mesh: mesh,
                        sprite: sprite,
                        targetPos: { x: mapX, y: boxH/2, z: mapZ },
                        targetSize: new THREE.Vector3(boxW, boxH, boxD),
                        lastSeen: performance.now(),
                        score: pred.score
                    });
                    currentFrameIds.add(id);
                }
            });

            // 3. Cleanup logic (Optional: fade out old objects, but prompt asks for "persistent twin")
            // To prevent memory explosion while moving, we might slowly fade very old unseen objects,
            // but for this demo, we'll keep them to build a larger map.
            // We animate the interpolation here.
            
            state.entities.forEach((entity, id) => {
                // Smooth position update
                entity.mesh.position.lerp(new THREE.Vector3(entity.targetPos.x, entity.targetPos.y, entity.targetPos.z), 0.1);
                // Smooth scale update
                entity.mesh.scale.lerp(entity.targetSize, 0.1);
                // Update sprite height
                entity.sprite.position.y = entity.mesh.scale.y + 0.5;

                // Visual feedback: dim objects not seen recently
                const timeSinceSeen = performance.now() - entity.lastSeen;
                if (timeSinceSeen > 2000) {
                    entity.mesh.material.opacity = Math.max(0.2, 0.8 - (timeSinceSeen - 2000)/5000);
                    entity.mesh.material.color.setHex(0x444444); // Gray out lost objects
                    entity.sprite.material.opacity = Math.max(0.2, 0.8 - (timeSinceSeen - 2000)/5000);
                } else {
                    entity.mesh.material.opacity = 0.8;
                    // Reset color unless hovered (handled in raycaster)
                    if(entity.mesh.material.color.getHex() === 0x444444) {
                       entity.mesh.material.color.setHex(0x00f3ff); 
                    }
                    entity.sprite.material.opacity = 1;
                }
            });

            els.entityCount.innerText = state.entities.size;
        }

        function draw2DOverlay(predictions) {
            // Clear previous frame
            els.ctx.clearRect(0, 0, els.canvas.width, els.canvas.height);
            
            // Calculate scale factors because canvas size matches video visual size,
            // but detections are based on video source resolution.
            const rect = els.video.getBoundingClientRect();
            const scaleX = rect.width / state.cameraWidth;
            const scaleY = rect.height / state.cameraHeight;

            predictions.forEach(pred => {
                if (pred.score < 0.5) return;

                const [x, y, w, h] = pred.bbox;
                // Scale coordinates to fit visual canvas size
                const sx = x * scaleX;
                const sy = y * scaleY;
                const sw = w * scaleX;
                const sh = h * scaleY;

                // Draw Cyberpunk Bounding Box
                els.ctx.strokeStyle = '#00ff66';
                els.ctx.lineWidth = 2;
                
                // Draw corners only for a cool HUD look
                const cornerL = 15;
                els.ctx.beginPath();
                // Top Left
                els.ctx.moveTo(sx, sy + cornerL); els.ctx.lineTo(sx, sy); els.ctx.lineTo(sx + cornerL, sy);
                // Top Right
                els.ctx.moveTo(sx + sw - cornerL, sy); els.ctx.lineTo(sx + sw, sy); els.ctx.lineTo(sx + sw, sy + cornerL);
                // Bottom Right
                els.ctx.moveTo(sx + sw, sy + sh - cornerL); els.ctx.lineTo(sx + sw, sy + sh); els.ctx.lineTo(sx + sw - cornerL, sy + sh);
                // Bottom Left
                els.ctx.moveTo(sx + cornerL, sy + sh); els.ctx.lineTo(sx, sy + sh); els.ctx.lineTo(sx, sy + sh - cornerL);
                els.ctx.stroke();

                // Fill faint background
                els.ctx.fillStyle = 'rgba(0, 255, 102, 0.1)';
                els.ctx.fillRect(sx, sy, sw, sh);

                // Draw Label Panel
                const text = `${pred.class.toUpperCase()} [${Math.round(pred.score * 100)}%]`;
                els.ctx.font = '12px "Share Tech Mono"';
                const textWidth = els.ctx.measureText(text).width;
                
                els.ctx.fillStyle = 'rgba(5, 5, 16, 0.8)';
                els.ctx.fillRect(sx, sy > 20 ? sy - 20 : sy, textWidth + 8, 18);
                
                els.ctx.fillStyle = '#00ff66';
                els.ctx.fillText(text, sx + 4, sy > 20 ? sy - 6 : sy + 14);
            });

            // Draw center crosshair
            const cx = els.canvas.width / 2;
            const cy = els.canvas.height / 2;
            els.ctx.strokeStyle = 'rgba(0, 243, 255, 0.5)';
            els.ctx.beginPath();
            els.ctx.moveTo(cx - 20, cy); els.ctx.lineTo(cx + 20, cy);
            els.ctx.moveTo(cx, cy - 20); els.ctx.lineTo(cx, cy + 20);
            els.ctx.stroke();
            els.ctx.beginPath();
            els.ctx.arc(cx, cy, 15, 0, Math.PI*2);
            els.ctx.stroke();
        }

        async function runScanner() {
            if (!state.isRunning) return;

            // Performance tracking
            const now = performance.now();
            state.frameCount++;
            if (now - state.lastTime >= 1000) {
                els.fpsCount.innerText = state.frameCount;
                state.frameCount = 0;
                state.lastTime = now;
            }

            // 1. Run AI Detection on current video frame
            if (els.video.readyState === 4) { // HAVE_ENOUGH_DATA
                try {
                    const predictions = await state.model.detect(els.video);
                    
                    // 2. Update 2D Overlay
                    draw2DOverlay(predictions);
                    
                    // 3. Update 3D Digital Twin
                    processDetections(predictions);

                } catch (err) {
                    console.error("Detection error:", err);
                }
            }

            // 4. Render 3D Scene
            controls.update();
            renderer.render(scene, camera);

            // Loop
            requestAnimationFrame(runScanner);
        }

        els.btnExport.addEventListener('click', () => {
            logMsg("Initializing data export protocol...", "warn");
            const exporter = new THREE.GLTFExporter();
            
            // Only export the entities and grid, not camera/lights necessary for viewing here
            const exportScene = new THREE.Scene();
            exportScene.add(scanGrid.clone());
            state.entities.forEach(ent => {
                const meshClone = ent.mesh.clone();
                // Strip custom userData to keep file clean if desired, or keep it for metadata
                exportScene.add(meshClone);
            });

            exporter.parse(exportScene, function (gltf) {
                const output = JSON.stringify(gltf, null, 2);
                const blob = new Blob([output], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.style.display = 'none';
                link.href = url;
                link.download = `neural_map_${Date.now()}.gltf`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                logMsg("Export complete. File downloaded.", "success");
            }, { binary: false }); // Export as JSON string format for easy inspection
        });

        els.btnReset.addEventListener('click', () => {
            logMsg("Purging spatial memory...", "error");
            state.entities.forEach(ent => {
                scene.remove(ent.mesh);
                ent.mesh.geometry.dispose();
                ent.mesh.material.dispose();
            });
            state.entities.clear();
            state.entityIdCounter = 0;
            logMsg("Memory purged. Re-initializing scan.", "info");
        });


        async function startApp() {
            try {
                initThreeJS();
                await initCamera();
                await initAI();
                
                // Hide loader
                els.loader.style.opacity = '0';
                setTimeout(() => els.loader.style.display = 'none', 500);
                
                logMsg("All systems operational. Commencing scan.", "success");
                
                // Start Loop
                state.isRunning = true;
                runScanner();
                
            } catch (error) {
                console.error("Initialization sequence failed:", error);
                document.getElementById('loader').innerHTML = `
                    <div class="text-red-500 font-bold text-xl text-center">
                        SYSTEM FAILURE<br>
                        <span class="text-sm font-normal text-white">${error.message}</span><br>
                        <button onclick="location.reload()" class="mt-4 border border-red-500 p-2 text-white hover:bg-red-500">REBOOT</button>
                    </div>
                `;
            }
        }

        // Boot up
        window.onload = startApp;

    </script>
</body>
</html>
